basePath: /api
definitions:
  app_controllers_admin.EmailPreviewRequest:
    properties:
      content:
        type: string
      vars:
        additionalProperties: true
        type: object
    required:
    - content
    type: object
  app_controllers_admin.EmailTemplateUpdateRequest:
    properties:
      content:
        type: string
      description:
        type: string
      status:
        type: integer
      subject:
        type: string
    required:
    - content
    type: object
  app_controllers_public.LoginRequest:
    properties:
      password:
        type: string
      userName:
        type: string
      username:
        type: string
    required:
    - password
    type: object
  app_controllers_public.RefreshTokenRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  app_controllers_public.RegisterRequest:
    properties:
      code:
        type: string
      email:
        maxLength: 255
        type: string
      password:
        type: string
      username:
        type: string
    required:
    - code
    - email
    - password
    - username
    type: object
  app_controllers_public.ResetEmailRequest:
    properties:
      email:
        type: string
      lang:
        type: string
    required:
    - email
    type: object
  app_controllers_public.ResetPasswordConfirmRequest:
    properties:
      code:
        type: string
      email:
        type: string
      new_password:
        type: string
    required:
    - code
    - email
    - new_password
    type: object
  app_controllers_public.SendCodeRequest:
    properties:
      email:
        type: string
      lang:
        type: string
    required:
    - email
    type: object
  app_controllers_user.ChangePasswordRequest:
    properties:
      new_password:
        minLength: 6
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  app_controllers_user.UpdateProfileRequest:
    properties:
      avatar:
        type: string
      birthday:
        type: integer
      gender:
        type: integer
      mobile:
        type: string
      motto:
        type: string
      nickname:
        type: string
    type: object
  fst_backend_app_services.UserCreateRequest:
    properties:
      email:
        type: string
      group_id:
        type: integer
      mobile:
        type: string
      nickname:
        type: string
      password:
        type: string
      role:
        type: string
      status:
        type: integer
      username:
        type: string
    required:
    - email
    - password
    - username
    type: object
  fst_backend_app_services.UserUpdateRequest:
    properties:
      avatar:
        type: string
      birthday:
        type: integer
      email:
        type: string
      gender:
        type: integer
      group_id:
        type: integer
      id:
        type: integer
      mobile:
        type: string
      motto:
        type: string
      nickname:
        type: string
      role:
        type: string
      status:
        type: integer
    required:
    - id
    type: object
  utils.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: FST Platform 后端 API 接口文档
  title: FST Platform API
  version: "1.0"
paths:
  /api/v1/admin/email-templates:
    get:
      consumes:
      - application/json
      description: 获取所有邮件模板列表
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 获取邮件模板列表
      tags:
      - Admin-邮件模板
  /api/v1/admin/email-templates/{id}:
    get:
      consumes:
      - application/json
      description: 根据ID获取邮件模板详情
      parameters:
      - description: 模板ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 获取邮件模板详情
      tags:
      - Admin-邮件模板
    put:
      consumes:
      - application/json
      description: 更新邮件模板内容
      parameters:
      - description: 模板ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_controllers_admin.EmailTemplateUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 更新邮件模板
      tags:
      - Admin-邮件模板
  /api/v1/admin/email-templates/{id}/preview:
    post:
      consumes:
      - application/json
      description: 预览邮件模板渲染效果
      parameters:
      - description: 模板ID
        in: path
        name: id
        required: true
        type: integer
      - description: 预览参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_controllers_admin.EmailPreviewRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 预览邮件模板
      tags:
      - Admin-邮件模板
  /api/v1/admin/email-templates/{id}/reset:
    post:
      consumes:
      - application/json
      description: 重置邮件模板为系统默认模板
      parameters:
      - description: 模板ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 重置邮件模板
      tags:
      - Admin-邮件模板
  /api/v1/admin/logs:
    get:
      consumes:
      - application/json
      description: 获取操作日志列表（分页）
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      - description: 用户ID
        in: query
        name: user_id
        type: integer
      - description: 操作类型
        in: query
        name: action
        type: string
      - description: 开始时间(时间戳)
        in: query
        name: start_time
        type: integer
      - description: 结束时间(时间戳)
        in: query
        name: end_time
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 获取操作日志列表
      tags:
      - Admin-操作日志
  /api/v1/admin/logs/clean:
    post:
      consumes:
      - application/json
      description: 清理指定时间之前的操作日志
      parameters:
      - description: '清理参数 {before_time: timestamp}'
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            format: int64
            type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 清理操作日志
      tags:
      - Admin-操作日志
  /api/v1/admin/logs/stats:
    get:
      consumes:
      - application/json
      description: 获取操作日志统计数据
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 获取操作日志统计
      tags:
      - Admin-操作日志
  /api/v1/admin/users:
    get:
      consumes:
      - application/json
      description: 获取所有用户列表（分页）
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      - description: 搜索关键词
        in: query
        name: keyword
        type: string
      - description: 状态
        in: query
        name: status
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 获取用户列表
      tags:
      - Admin-用户管理
    post:
      consumes:
      - application/json
      description: 管理员创建新用户
      parameters:
      - description: 用户信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/fst_backend_app_services.UserCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 创建用户
      tags:
      - Admin-用户管理
  /api/v1/admin/users/{id}:
    delete:
      consumes:
      - application/json
      description: 删除指定用户
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 删除用户
      tags:
      - Admin-用户管理
    get:
      consumes:
      - application/json
      description: 根据ID获取用户详情
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 获取用户详情
      tags:
      - Admin-用户管理
    put:
      consumes:
      - application/json
      description: 更新用户信息
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      - description: 用户信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/fst_backend_app_services.UserUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 更新用户
      tags:
      - Admin-用户管理
  /api/v1/admin/users/{id}/password:
    put:
      consumes:
      - application/json
      description: 管理员重置用户密码
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      - description: '新密码 {password: \'
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 重置用户密码
      tags:
      - Admin-用户管理
  /api/v1/admin/users/{id}/status:
    put:
      consumes:
      - application/json
      description: 启用/禁用用户
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      - description: '状态 {status: 0|1}'
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 更新用户状态
      tags:
      - Admin-用户管理
  /api/v1/demo/echo:
    post:
      consumes:
      - application/json
      description: 回显请求数据
      parameters:
      - description: 请求数据
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Demo插件Echo
      tags:
      - Plugin-Demo
  /api/v1/demo/hello:
    get:
      consumes:
      - application/json
      description: 示例插件的Hello接口
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Demo插件Hello
      tags:
      - Plugin-Demo
  /api/v1/demo/info:
    get:
      consumes:
      - application/json
      description: 获取Demo插件的详细信息
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Demo插件信息
      tags:
      - Plugin-Demo
  /api/v1/public/forgot-password:
    post:
      consumes:
      - application/json
      description: 发送重置密码验证码到邮箱
      parameters:
      - description: 邮箱信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_controllers_public.ResetEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      summary: 发送重置密码邮件
      tags:
      - Public-认证
  /api/v1/public/login:
    post:
      consumes:
      - application/json
      description: 用户登录并获取 Token
      parameters:
      - description: 登录信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_controllers_public.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
      summary: 用户登录
      tags:
      - Public-认证
  /api/v1/public/refresh-token:
    post:
      consumes:
      - application/json
      description: 使用refresh token获取新的access token
      parameters:
      - description: 刷新令牌
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_controllers_public.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      summary: 刷新Token
      tags:
      - Public-认证
  /api/v1/public/register:
    post:
      consumes:
      - application/json
      description: 注册一个新用户
      parameters:
      - description: 注册信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_controllers_public.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.Response'
      summary: 用户注册
      tags:
      - Public-认证
  /api/v1/public/reset-password:
    post:
      consumes:
      - application/json
      description: 使用验证码重置密码
      parameters:
      - description: 重置信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_controllers_public.ResetPasswordConfirmRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      summary: 确认重置密码
      tags:
      - Public-认证
  /api/v1/public/send-register-code:
    post:
      consumes:
      - application/json
      description: 发送注册验证码到邮箱
      parameters:
      - description: 邮箱信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_controllers_public.SendCodeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      summary: 发送注册验证码
