basePath: /api
definitions:
  app_controllers_admin.BatchUpdateSettingsRequest:
    properties:
      settings:
        additionalProperties:
          type: string
        type: object
    required:
    - settings
    type: object
  app_controllers_admin.CreateSettingRequest:
    properties:
      category:
        description: basic, security, email, custom
        type: string
      description:
        type: string
      is_editable:
        type: boolean
      is_public:
        type: boolean
      key:
        type: string
      label:
        type: string
      sort_order:
        type: integer
      type:
        description: string, number, boolean, json
        type: string
      value:
        type: string
    required:
    - key
    - label
    type: object
  app_controllers_admin.EmailPreviewRequest:
    properties:
      content:
        type: string
      vars:
        additionalProperties: true
        type: object
    required:
    - content
    type: object
  app_controllers_admin.EmailTemplateUpdateRequest:
    properties:
      content:
        type: string
      description:
        type: string
      status:
        type: integer
      subject:
        type: string
    required:
    - content
    type: object
  app_controllers_admin.SettingsListResponse:
    properties:
      categories:
        items:
          $ref: '#/definitions/fst_backend_app_models.SettingsGroup'
        type: array
    type: object
  app_controllers_admin.UpdateSettingMetaRequest:
    properties:
      category:
        type: string
      description:
        type: string
      is_editable:
        type: boolean
      is_public:
        type: boolean
      label:
        type: string
      sort_order:
        type: integer
      type:
        type: string
      value:
        type: string
    type: object
  app_controllers_admin.UpdateSettingRequest:
    properties:
      value:
        type: string
    type: object
  app_controllers_public.AppConfigResponse:
    properties:
      allow_register:
        description: 功能开关
        type: boolean
      copyright:
        type: string
      default_lang:
        description: 语言配置
        type: string
      geetest_captcha_id:
        description: 极验配置
        type: string
      geetest_enabled:
        type: boolean
      icp:
        type: string
      site_desc:
        type: string
      site_logo:
        type: string
      site_name:
        description: 基本配置
        type: string
      version:
        type: string
    type: object
  app_controllers_public.LoginRequest:
    properties:
      password:
        type: string
      userName:
        type: string
      username:
        type: string
    required:
    - password
    type: object
  app_controllers_public.RefreshTokenRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  app_controllers_public.RegisterRequest:
    properties:
      code:
        type: string
      email:
        maxLength: 255
        type: string
      password:
        type: string
      username:
        type: string
    required:
    - code
    - email
    - password
    - username
    type: object
  app_controllers_public.ResetEmailRequest:
    properties:
      email:
        type: string
      lang:
        type: string
    required:
    - email
    type: object
  app_controllers_public.ResetPasswordConfirmRequest:
    properties:
      code:
        type: string
      email:
        type: string
      new_password:
        type: string
    required:
    - code
    - email
    - new_password
    type: object
  app_controllers_public.SendCodeRequest:
    properties:
      email:
        type: string
      lang:
        type: string
    required:
    - email
    type: object
  app_controllers_user.ChangePasswordRequest:
    properties:
      new_password:
        minLength: 6
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  app_controllers_user.UpdateProfileRequest:
    properties:
      avatar:
        type: string
      birthday:
        type: integer
      gender:
        type: integer
      mobile:
        type: string
      motto:
        type: string
      nickname:
        type: string
    type: object
  fst_backend_app_models.SettingDTO:
    properties:
      category:
        type: string
      description:
        type: string
      is_editable:
        type: boolean
      is_public:
        type: boolean
      key:
        type: string
      label:
        type: string
      type:
        type: string
      value: {}
    type: object
  fst_backend_app_models.SettingsGroup:
    properties:
      category:
        type: string
      items:
        items:
          $ref: '#/definitions/fst_backend_app_models.SettingDTO'
        type: array
      label:
        type: string
    type: object
  fst_backend_app_services.UserCreateRequest:
    properties:
      email:
        type: string
      group_id:
        type: integer
      mobile:
        type: string
      nickname:
        type: string
      password:
        type: string
      role:
        type: string
      status:
        type: integer
      username:
        type: string
    required:
    - email
    - password
    - username
    type: object
  fst_backend_app_services.UserUpdateRequest:
    properties:
      avatar:
        type: string
      birthday:
        type: integer
      email:
        type: string
      gender:
        type: integer
      group_id:
        type: integer
      id:
        type: integer
      mobile:
        type: string
      motto:
        type: string
      nickname:
        type: string
      role:
        type: string
      status:
        type: integer
    required:
    - id
    type: object
  utils.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: FST Platform 后端 API 接口文档
  title: FST Platform API
  version: "1.0"
paths:
  /api/v1/admin/email-templates:
    get:
      consumes:
      - application/json
      description: 获取所有邮件模板列表
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 获取邮件模板列表
      tags:
      - Admin-邮件模板
  /api/v1/admin/email-templates/{id}:
    get:
      consumes:
      - application/json
      description: 根据ID获取邮件模板详情
      parameters:
      - description: 模板ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 获取邮件模板详情
      tags:
      - Admin-邮件模板
    put:
      consumes:
      - application/json
      description: 更新邮件模板内容
      parameters:
      - description: 模板ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_controllers_admin.EmailTemplateUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 更新邮件模板
      tags:
      - Admin-邮件模板
  /api/v1/admin/email-templates/{id}/preview:
    post:
      consumes:
      - application/json
      description: 预览邮件模板渲染效果
      parameters:
      - description: 模板ID
        in: path
        name: id
        required: true
        type: integer
      - description: 预览参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_controllers_admin.EmailPreviewRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 预览邮件模板
      tags:
      - Admin-邮件模板
  /api/v1/admin/email-templates/{id}/reset:
    post:
      consumes:
      - application/json
      description: 重置邮件模板为系统默认模板
      parameters:
      - description: 模板ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 重置邮件模板
      tags:
      - Admin-邮件模板
  /api/v1/admin/logs:
    get:
      consumes:
      - application/json
      description: 获取操作日志列表（分页），仅支持简单分页浏览
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 获取操作日志列表
      tags:
      - Admin-操作日志
  /api/v1/admin/logs/clean:
    post:
      consumes:
      - application/json
      description: 清理指定时间之前的操作日志，用于控制日志数量
      parameters:
      - description: '清理参数 {before_time: timestamp}'
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            format: int64
            type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 清理操作日志
      tags:
      - Admin-操作日志
  /api/v1/admin/settings:
    get:
      consumes:
      - application/json
      description: 获取所有系统配置，按分类分组
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/app_controllers_admin.SettingsListResponse'
              type: object
      security:
      - BearerAuth: []
      summary: 获取所有系统配置
      tags:
      - Admin-系统配置
    post:
      consumes:
      - application/json
      description: 创建一个新的自定义配置项
      parameters:
      - description: 配置信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_controllers_admin.CreateSettingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 创建新配置
      tags:
      - Admin-系统配置
  /api/v1/admin/settings/{key}:
    delete:
      consumes:
      - application/json
      description: 删除指定的自定义配置项
      parameters:
      - description: 配置键名
        in: path
        name: key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 删除配置
      tags:
      - Admin-系统配置
    get:
      consumes:
      - application/json
      description: 根据键名获取配置详情
      parameters:
      - description: 配置键名
        in: path
        name: key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 获取单个配置
      tags:
      - Admin-系统配置
    put:
      consumes:
      - application/json
      description: 更新指定配置项的值
      parameters:
      - description: 配置键名
        in: path
        name: key
        required: true
        type: string
      - description: 配置值
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_controllers_admin.UpdateSettingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 更新单个配置值
      tags:
      - Admin-系统配置
  /api/v1/admin/settings/{key}/meta:
    put:
      consumes:
      - application/json
      description: 更新配置项的完整信息（包括值和元数据）
      parameters:
      - description: 配置键名
        in: path
        name: key
        required: true
        type: string
      - description: 配置信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_controllers_admin.UpdateSettingMetaRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 更新配置元数据
      tags:
      - Admin-系统配置
  /api/v1/admin/settings/batch:
    put:
      consumes:
      - application/json
      description: 批量更新多个配置项的值
      parameters:
      - description: 配置键值对
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_controllers_admin.BatchUpdateSettingsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 批量更新配置
      tags:
      - Admin-系统配置
  /api/v1/admin/settings/category/{category}:
    get:
      consumes:
      - application/json
      description: 获取指定分类下的所有配置项
      parameters:
      - description: 分类名称
        in: path
        name: category
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 获取指定分类的配置
      tags:
      - Admin-系统配置
  /api/v1/admin/users:
    get:
      consumes:
      - application/json
      description: 获取所有用户列表（分页）
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      - description: 搜索关键词
        in: query
        name: keyword
        type: string
      - description: 状态
        in: query
        name: status
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 获取用户列表
      tags:
      - Admin-用户管理
    post:
      consumes:
      - application/json
      description: 管理员创建新用户
      parameters:
      - description: 用户信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/fst_backend_app_services.UserCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 创建用户
      tags:
      - Admin-用户管理
  /api/v1/admin/users/{id}:
    delete:
      consumes:
      - application/json
      description: 删除指定用户
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 删除用户
      tags:
      - Admin-用户管理
    get:
      consumes:
      - application/json
      description: 根据ID获取用户详情
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 获取用户详情
      tags:
      - Admin-用户管理
    put:
      consumes:
      - application/json
      description: 更新用户信息
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      - description: 用户信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/fst_backend_app_services.UserUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 更新用户
      tags:
      - Admin-用户管理
  /api/v1/admin/users/{id}/password:
    put:
      consumes:
      - application/json
      description: 管理员重置用户密码
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      - description: '新密码 {password: \'
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 重置用户密码
      tags:
      - Admin-用户管理
  /api/v1/admin/users/{id}/status:
    put:
      consumes:
      - application/json
      description: 启用/禁用用户
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      - description: '状态 {status: 0|1}'
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 更新用户状态
      tags:
      - Admin-用户管理
  /api/v1/admin/users/batch-simple:
    post:
      consumes:
      - application/json
      description: 根据用户ID列表批量获取用户简要信息（用户名、昵称等），用于日志等场景显示用户名
      parameters:
      - description: '用户ID列表 {ids: [1, 2, 3]}'
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            items:
              format: int64
              type: integer
            type: array
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 批量获取用户简要信息
      tags:
      - Admin-用户管理
  /api/v1/demo/echo:
    post:
      consumes:
      - application/json
      description: 回显请求数据
      parameters:
      - description: 请求数据
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Demo插件Echo
      tags:
      - Plugin-Demo
  /api/v1/demo/hello:
    get:
      consumes:
      - application/json
      description: 示例插件的Hello接口
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Demo插件Hello
      tags:
      - Plugin-Demo
  /api/v1/demo/info:
    get:
      consumes:
      - application/json
      description: 获取Demo插件的详细信息
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Demo插件信息
      tags:
      - Plugin-Demo
  /api/v1/public/app-config:
    get:
      description: 获取前端应用需要的公开配置信息
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/app_controllers_public.AppConfigResponse'
              type: object
      summary: 获取应用配置
      tags:
      - Public-配置
  /api/v1/public/forgot-password:
    post:
      consumes:
      - application/json
      description: 发送重置密码验证码到邮箱
      parameters:
      - description: 邮箱信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_controllers_public.ResetEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      summary: 发送重置密码邮件
      tags:
      - Public-认证
  /api/v1/public/login:
    post:
      consumes:
      - application/json
      description: 用户登录并获取 Token
      parameters:
      - description: 登录信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_controllers_public.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
      summary: 用户登录
      tags:
      - Public-认证
  /api/v1/public/refresh-token:
    post:
      consumes:
      - application/json
      description: 使用refresh token获取新的access token
      parameters:
      - description: 刷新令牌
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_controllers_public.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      summary: 刷新Token
      tags:
