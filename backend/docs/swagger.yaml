basePath: /api
definitions:
  app_controllers_admin.AdminCompleteOrderRequest:
    properties:
      memo:
        type: string
    type: object
  app_controllers_admin.BatchUpdateSettingsRequest:
    properties:
      settings:
        additionalProperties:
          type: string
        type: object
    required:
    - settings
    type: object
  app_controllers_admin.CreateSettingRequest:
    properties:
      category:
        description: basic, security, email, custom
        type: string
      description:
        type: string
      is_editable:
        type: boolean
      is_public:
        type: boolean
      key:
        type: string
      label:
        type: string
      sort_order:
        type: integer
      type:
        description: string, number, boolean, json
        type: string
      value:
        type: string
    required:
    - key
    - label
    type: object
  app_controllers_admin.EmailPreviewRequest:
    properties:
      content:
        type: string
      vars:
        additionalProperties: true
        type: object
    required:
    - content
    type: object
  app_controllers_admin.EmailSendTestRequest:
    properties:
      content:
        type: string
      subject:
        type: string
      template_id:
        description: 可选：使用模板发送
        type: integer
      to:
        type: string
    required:
    - to
    type: object
  app_controllers_admin.EmailTemplateUpdateRequest:
    properties:
      content:
        type: string
      description:
        type: string
      status:
        type: integer
      subject:
        type: string
    required:
    - content
    type: object
  app_controllers_admin.SettingsListResponse:
    properties:
      categories:
        items:
          $ref: '#/definitions/fst_backend_app_models.SettingsGroup'
        type: array
    type: object
  app_controllers_admin.UpdateSettingMetaRequest:
    properties:
      category:
        type: string
      description:
        type: string
      is_editable:
        type: boolean
      is_public:
        type: boolean
      label:
        type: string
      sort_order:
        type: integer
      type:
        type: string
      value:
        type: string
    type: object
  app_controllers_admin.UpdateSettingRequest:
    properties:
      value:
        type: string
    type: object
  app_controllers_public.AppConfigResponse:
    properties:
      allow_register:
        description: 功能开关
        type: boolean
      copyright:
        type: string
      default_lang:
        description: 语言配置
        type: string
      geetest_captcha_id:
        description: 极验配置
        type: string
      geetest_enabled:
        type: boolean
      icp:
        type: string
      site_desc:
        type: string
      site_logo:
        type: string
      site_name:
        description: 基本配置
        type: string
      version:
        type: string
    type: object
  app_controllers_public.LoginRequest:
    properties:
      password:
        type: string
      userName:
        type: string
      username:
        type: string
    required:
    - password
    type: object
  app_controllers_public.RefreshTokenRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  app_controllers_public.RegisterRequest:
    properties:
      code:
        type: string
      email:
        maxLength: 255
        type: string
      password:
        type: string
      username:
        type: string
    required:
    - code
    - email
    - password
    - username
    type: object
  app_controllers_public.ResetEmailRequest:
    properties:
      email:
        type: string
      lang:
        type: string
    required:
    - email
    type: object
  app_controllers_public.ResetPasswordConfirmRequest:
    properties:
      code:
        type: string
      email:
        type: string
      new_password:
        type: string
    required:
    - code
    - email
    - new_password
    type: object
  app_controllers_public.SendCodeRequest:
    properties:
      email:
        type: string
      lang:
        type: string
    required:
    - email
    type: object
  app_controllers_user.ChangePasswordRequest:
    properties:
      new_password:
        minLength: 6
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  app_controllers_user.CreateOrderRequest:
    properties:
      amount:
        type: number
      gateway_id:
        type: integer
      subject:
        type: string
    required:
    - amount
    - gateway_id
    type: object
  app_controllers_user.DeactivateAccountRequest:
    properties:
      password:
        type: string
      reason:
        type: string
    required:
    - password
    type: object
  app_controllers_user.SendEmailCodeRequest:
    properties:
      lang:
        type: string
      new_email:
        type: string
    required:
    - new_email
    type: object
  app_controllers_user.SendPhoneCodeRequest:
    properties:
      new_mobile:
        type: string
    required:
    - new_mobile
    type: object
  app_controllers_user.UpdateProfileRequest:
    properties:
      avatar:
        type: string
      back_ground:
        type: string
      birthday:
        type: integer
      country:
        type: string
      gender:
        type: integer
      language:
        type: string
      mobile:
        type: string
      motto:
        type: string
      nickname:
        type: string
    type: object
  app_controllers_user.UpdateSettingsRequest:
    properties:
      language:
        type: string
      notify_email:
        type: boolean
      theme:
        type: string
    type: object
  app_controllers_user.VerifyEmailChangeRequest:
    properties:
      code:
        type: string
      new_email:
        type: string
    required:
    - code
    - new_email
    type: object
  app_controllers_user.VerifyPhoneChangeRequest:
    properties:
      code:
        type: string
      new_mobile:
        type: string
    required:
    - code
    - new_mobile
    type: object
  fst_backend_app_models.SettingDTO:
    properties:
      category:
        type: string
      description:
        type: string
      is_editable:
        type: boolean
      is_public:
        type: boolean
      key:
        type: string
      label:
        type: string
      type:
        type: string
      value: {}
    type: object
  fst_backend_app_models.SettingsGroup:
    properties:
      category:
        type: string
      items:
        items:
          $ref: '#/definitions/fst_backend_app_models.SettingDTO'
        type: array
      label:
        type: string
    type: object
  fst_backend_app_services.UserCreateRequest:
    properties:
      email:
        type: string
      group_id:
        type: integer
      mobile:
        type: string
      nickname:
        type: string
      password:
        type: string
      role:
        type: string
      status:
        type: integer
      username:
        type: string
    required:
    - email
    - password
    - username
    type: object
  fst_backend_app_services.UserUpdateRequest:
    properties:
      avatar:
        type: string
      back_ground:
        type: string
      birthday:
        type: integer
      country:
        type: string
      email:
        type: string
      gender:
        description: 指针类型，允许设置为0（保密）
        type: integer
      group_id:
        type: integer
      id:
        type: integer
      language:
        type: string
      mobile:
        type: string
      motto:
        type: string
      nickname:
        type: string
      role:
        type: string
      status:
        type: integer
    required:
    - id
    type: object
  utils.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: FST Platform 后端 API 接口文档
  title: FST Platform API
  version: "1.0"
paths:
  /api/v1/admin/email-logs:
    get:
      consumes:
      - application/json
      description: 分页获取邮件发送记录，支持按收件人、模板名、状态筛选
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      - description: 收件人邮箱（模糊）
        in: query
        name: to_email
        type: string
      - description: 模板名称
        in: query
        name: template_name
        type: string
      - default: -1
        description: '状态: -1=全部, 0=失败, 1=成功'
        in: query
        name: status
        type: integer
      - description: 开始时间 (YYYY-MM-DD HH:MM:SS)
        in: query
        name: start_time
        type: string
      - description: 结束时间 (YYYY-MM-DD HH:MM:SS)
        in: query
        name: end_time
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 获取邮件发送记录列表
      tags:
      - Admin-邮件日志
  /api/v1/admin/email-logs/{id}:
    get:
      consumes:
      - application/json
      description: 根据 ID 获取邮件日志详情，包含邮件内容
      parameters:
      - description: 日志ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 获取邮件发送记录详情
      tags:
      - Admin-邮件日志
  /api/v1/admin/email-logs/clean:
    post:
      consumes:
      - application/json
      description: 删除指定日期之前的邮件日志
      parameters:
      - description: '清理参数 {before: ''2025-01-01 00:00:00''}'
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 清理邮件发送记录
      tags:
      - Admin-邮件日志
  /api/v1/admin/email-logs/stats:
    get:
      consumes:
      - application/json
      description: 获取邮件发送总数、成功数、失败数
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 邮件发送统计
      tags:
      - Admin-邮件日志
  /api/v1/admin/email-logs/template-names:
    get:
      consumes:
      - application/json
      description: 获取邮件日志中出现的所有模板名，用于筛选
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 获取邮件模板名列表
      tags:
      - Admin-邮件日志
  /api/v1/admin/email-send-test:
    post:
      consumes:
      - application/json
      description: 发送测试邮件，验证SMTP配置是否正常，支持选择模板发送
      parameters:
      - description: 测试邮件参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_controllers_admin.EmailSendTestRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 发件测试
      tags:
      - Admin-邮件模板
  /api/v1/admin/email-templates:
    get:
      consumes:
      - application/json
      description: 获取所有邮件模板列表
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 获取邮件模板列表
      tags:
      - Admin-邮件模板
  /api/v1/admin/email-templates/{id}:
    get:
      consumes:
      - application/json
      description: 根据ID获取邮件模板详情
      parameters:
      - description: 模板ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 获取邮件模板详情
      tags:
      - Admin-邮件模板
    put:
      consumes:
      - application/json
      description: 更新邮件模板内容
      parameters:
      - description: 模板ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_controllers_admin.EmailTemplateUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 更新邮件模板
      tags:
      - Admin-邮件模板
  /api/v1/admin/email-templates/{id}/preview:
    post:
      consumes:
      - application/json
      description: 预览邮件模板渲染效果
      parameters:
      - description: 模板ID
        in: path
        name: id
        required: true
        type: integer
      - description: 预览参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_controllers_admin.EmailPreviewRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 预览邮件模板
      tags:
      - Admin-邮件模板
  /api/v1/admin/email-templates/{id}/reset:
    post:
      consumes:
      - application/json
      description: 重置邮件模板为系统默认模板
      parameters:
      - description: 模板ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 重置邮件模板
      tags:
      - Admin-邮件模板
  /api/v1/admin/logs:
    get:
      consumes:
      - application/json
      description: 获取操作日志列表（分页），仅支持简单分页浏览
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 获取操作日志列表
      tags:
      - Admin-操作日志
  /api/v1/admin/logs/clean:
    post:
      consumes:
      - application/json
      description: 清理指定时间之前的操作日志，用于控制日志数量
      parameters:
      - description: '清理参数 {before_time: timestamp}'
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            format: int64
            type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 清理操作日志
      tags:
      - Admin-操作日志
  /api/v1/admin/payment/orders:
    get:
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      - default: -1
        description: 状态筛选（-1=全部）
        in: query
        name: status
        type: integer
      - description: 用户ID筛选
        in: query
        name: user_id
        type: integer
      - description: 搜索关键词
        in: query
        name: keyword
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 管理端-支付订单列表
      tags:
      - 管理端-支付
  /api/v1/admin/payment/orders/{id}:
    delete:
      parameters:
      - description: 订单ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 管理端-删除订单
      tags:
      - 管理端-支付
    get:
      parameters:
      - description: 订单ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 管理端-订单详情
      tags:
      - 管理端-支付
  /api/v1/admin/payment/orders/{id}/cancel:
    post:
      parameters:
      - description: 订单ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 管理端-取消订单
      tags:
      - 管理端-支付
  /api/v1/admin/payment/orders/{id}/complete:
    post:
      consumes:
      - application/json
      parameters:
      - description: 订单ID
        in: path
        name: id
        required: true
        type: integer
      - description: 补单备注
        in: body
        name: body
        schema:
          $ref: '#/definitions/app_controllers_admin.AdminCompleteOrderRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 管理端-手动补单
      tags:
      - 管理端-支付
  /api/v1/admin/payment/stats:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 管理端-支付统计
      tags:
      - 管理端-支付
  /api/v1/admin/settings:
    get:
      consumes:
      - application/json
      description: 获取所有系统配置，按分类分组
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/app_controllers_admin.SettingsListResponse'
              type: object
      security:
      - BearerAuth: []
      summary: 获取所有系统配置
      tags:
      - Admin-系统配置
    post:
      consumes:
      - application/json
      description: 创建一个新的自定义配置项
      parameters:
      - description: 配置信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_controllers_admin.CreateSettingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 创建新配置
      tags:
      - Admin-系统配置
  /api/v1/admin/settings/{key}:
    delete:
      consumes:
      - application/json
      description: 删除指定的自定义配置项
      parameters:
      - description: 配置键名
        in: path
        name: key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 删除配置
      tags:
      - Admin-系统配置
    get:
      consumes:
      - application/json
      description: 根据键名获取配置详情
      parameters:
      - description: 配置键名
        in: path
        name: key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 获取单个配置
      tags:
      - Admin-系统配置
    put:
      consumes:
      - application/json
      description: 更新指定配置项的值
      parameters:
      - description: 配置键名
        in: path
        name: key
        required: true
        type: string
      - description: 配置值
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_controllers_admin.UpdateSettingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 更新单个配置值
      tags:
      - Admin-系统配置
  /api/v1/admin/settings/{key}/meta:
    put:
      consumes:
      - application/json
      description: 更新配置项的完整信息（包括值和元数据）
      parameters:
      - description: 配置键名
        in: path
        name: key
        required: true
        type: string
      - description: 配置信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_controllers_admin.UpdateSettingMetaRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 更新配置元数据
      tags:
      - Admin-系统配置
  /api/v1/admin/settings/batch:
    put:
      consumes:
      - application/json
      description: 批量更新多个配置项的值
      parameters:
      - description: 配置键值对
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_controllers_admin.BatchUpdateSettingsRequest'
      produces:
      - application/json
      responses:
        "200":
