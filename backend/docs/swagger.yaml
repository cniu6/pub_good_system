      description: 返回验证码清理任务的运行状态、间隔、上次/下次执行时间
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 获取清理任务状态
      tags:
      - 系统管理
  /api/v1/user/avatar:
    put:
      consumes:
      - application/json
      description: 更新当前用户的头像URL
      parameters:
      - description: '头像URL {avatar: \'
        in: body
        name: request
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 更新头像
      tags:
      - 用户中心
  /api/v1/user/password:
    put:
      consumes:
      - application/json
      description: 修改当前登录用户的密码
      parameters:
      - description: 密码信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_controllers_user.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
