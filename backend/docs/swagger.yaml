      - 用户中心
    put:
      consumes:
      - application/json
      description: 更新当前登录用户的个人信息
      parameters:
      - description: 更新信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_controllers_user.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 更新个人信息
      tags:
      - 用户中心
  /api/v1/user/routes:
    get:
      consumes:
      - application/json
      description: 获取当前用户可访问的路由列表
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 获取用户路由
      tags:
      - 用户中心
  /api/v1/user/settings:
    get:
      consumes:
      - application/json
      description: 获取当前用户的个人设置
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 获取用户设置
      tags:
      - 用户中心
  /api/v1/user/stats:
    get:
      consumes:
      - application/json
      description: 获取当前用户的统计数据
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: 获取用户统计
      tags:
      - 用户中心
securityDefinitions:
  BearerAuth:
    description: 'JWT认证令牌，格式: Bearer {token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
