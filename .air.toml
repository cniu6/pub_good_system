# Air - Go 热重载配置
# 安装: go install github.com/cosmtrek/air@latest
# 使用: air

root = "."
tmp_dir = "build/tmp"

[build]
# 构建前执行的命令
pre_cmd = [
    "go run backend/app/plugins/gen_plugins.go",
    "cd backend && swag init -g cmd/main.go -o docs --parseDependency --parseInternal"
]

# 主程序入口
cmd = "go build -o ./build/fst.exe ./backend/cmd/main.go"

# 运行的二进制文件
bin = "./build/fst.exe"

# 运行时参数
args_bin = []

# 监听的文件扩展名
include_ext = ["go", "tpl", "tmpl", "html", "json", "yaml", "yml"]

# 排除的目录
exclude_dir = ["assets", "tmp", "vendor", "node_modules", "build", "docs", "frontend/node_modules"]

# 排除的文件
exclude_file = []

# 排除不需要监听的文件正则
exclude_regex = ["_test\\.go$", ".*_gen\\.go$"]

# 排除不变的目录
exclude_unchanged = true

# 监听根目录下的子目录
include_dir = ["backend"]

# 同时监听的根目录文件
include_file = []

# 延迟触发构建（毫秒）
delay = 1000

# 发生错误时停止运行
stop_on_error = true

# 日志文件
log = "build/air.log"

# 轮询监听（某些系统不支持 fsnotify）
poll = false

# 轮询间隔
poll_interval = 500

[log]
# 显示日志时间
time = true

# 只显示主日志
main_only = false

[color]
# 自定义颜色
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
# 退出时清理临时目录
clean_on_exit = true

[screen]
# 清屏
clear_on_rebuild = true
